name: Deploy

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  deploy-preview:
    name: Vercel preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Deploy preview
        id: deploy_preview
        run: |
          bash scripts/deploy-vercel.sh preview --output .vercel/preview-url.txt
          echo "url=$(tail -n1 .vercel/preview-url.txt | tr -d '\n')" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = process.env.url;
            const body = `🚀 Preview deployed: ${url}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
        env:
          url: ${{ steps.deploy_preview.outputs.url }}

  deploy-backend:
    name: GCP backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    outputs:
      api_url: ${{ steps.deployment_outputs.outputs.api_url }}
      owner_id: ${{ steps.deployment_outputs.outputs.owner_id }}
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      PULUMI_BACKEND_URL: ${{ vars.PULUMI_BACKEND_URL }}
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Authenticate to Google Cloud
        id: gcp_auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_lifetime: 3600s

      - name: Setup Google Cloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Artifact Registry authentication
        run: gcloud auth configure-docker "$GCP_REGION-docker.pkg.dev" --quiet
        env:
          CLOUDSDK_AUTH_ACCESS_TOKEN: ${{ steps.gcp_auth.outputs.access_token }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup Pulumi
        uses: pulumi/actions@v7
        with:
          pulumi-version: 3.254.0

      - name: Apply infrastructure and deploy image
        working-directory: infra
        env:
          CLOUDSDK_AUTH_ACCESS_TOKEN: ${{ steps.gcp_auth.outputs.access_token }}
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.gcp_auth.outputs.access_token }}
        run: |
          pulumi login "$PULUMI_BACKEND_URL"
          pulumi stack select production
          pulumi up --yes --skip-preview --suppress-outputs

      - name: Read deployment outputs
        id: deployment_outputs
        working-directory: infra
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.gcp_auth.outputs.access_token }}
        run: |
          {
            echo "api_url=$(pulumi stack output lifeApiUrl)"
            echo "owner_id=$(pulumi stack output lifeOwnerId)"
            echo "provision_job=$(pulumi stack output lifeProvisionJob)"
          } >> "$GITHUB_OUTPUT"

      - name: Migrate and provision owner
        env:
          CLOUDSDK_AUTH_ACCESS_TOKEN: ${{ steps.gcp_auth.outputs.access_token }}
        run: |
          gcloud run jobs execute "${{ steps.deployment_outputs.outputs.provision_job }}" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --wait

      - name: Verify deployed API
        env:
          CLOUDSDK_AUTH_ACCESS_TOKEN: ${{ steps.gcp_auth.outputs.access_token }}
          LIFE_API_BASE_URL: ${{ steps.deployment_outputs.outputs.api_url }}
          LIFE_EXPECTED_OWNER_ID: ${{ steps.deployment_outputs.outputs.owner_id }}
        run: |
          curl \
            --fail \
            --silent \
            --show-error \
            --retry 10 \
            --retry-all-errors \
            --retry-delay 5 \
            --max-time 300 \
            "$LIFE_API_BASE_URL/readyz" >/dev/null
          life_user_token="$(gcloud secrets versions access latest \
            --project="$GCP_PROJECT_ID" --secret=life-user-token)"
          actual_owner_id="$(curl \
            --fail \
            --silent \
            --show-error \
            --retry 5 \
            --retry-all-errors \
            --retry-delay 2 \
            --max-time 120 \
            --header "Authorization: Bearer $life_user_token" \
            "$LIFE_API_BASE_URL/v1/owner" | jq --raw-output '.id')"
          unset life_user_token
          test "$actual_owner_id" = "$LIFE_EXPECTED_OWNER_ID"

  deploy-production:
    name: Vercel production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: deploy-backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      LIFE_API_BASE_URL: ${{ needs.deploy-backend.outputs.api_url }}
      LIFE_EXPECTED_OWNER_ID: ${{ needs.deploy-backend.outputs.owner_id }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Authenticate to Google Cloud
        id: gcp_auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_lifetime: 3600s

      - name: Setup Google Cloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Synchronize Life server configuration
        env:
          CLOUDSDK_AUTH_ACCESS_TOKEN: ${{ steps.gcp_auth.outputs.access_token }}
        run: bash scripts/sync-life-vercel-env.sh

      - name: Deploy production
        run: bash scripts/deploy-vercel.sh production
