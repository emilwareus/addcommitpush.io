name: Quality

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Check Life contracts
        run: pnpm check:life-contracts

      - name: Check Life Realtime protocol
        run: pnpm check:life-realtime

  life-backend:
    name: Life backend checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: life
          POSTGRES_PASSWORD: life
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U life -d postgres"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    defaults:
      run:
        working-directory: life
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Test with PostgreSQL
        env:
          LIFE_TEST_DATABASE_URL: postgres://life:life@localhost:5432/postgres
        run: cargo test --all-targets --all-features --locked

      - name: Build release container
        run: docker build --tag life-agent:test .
