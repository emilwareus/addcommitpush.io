services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: life
      POSTGRES_USER: life
      POSTGRES_PASSWORD: life
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U life -d life"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - life-postgres:/var/lib/postgresql

volumes:
  life-postgres:
